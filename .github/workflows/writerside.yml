name: Build and Deploy Writerside Docs
on:
  push:
    branches: [ main ]
permissions:
  id-token: write
  pages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build Writerside
        uses: JetBrains/writerside-github-action@v4
        with:
          instance: docs/acb
          artifact: webHelpACB2-all.zip
      - name: Debug - listar archivos
        run: find . -name "*.zip" 2>/dev/null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: artifacts/webHelpACB2-all.zip
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docs
      - name: Unzip artifact
        run: unzip -O UTF-8 webHelpACB2-all.zip -d _site
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4